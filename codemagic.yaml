workflows:
  ios-adhoc:
    name: iOS Ad Hoc
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.14.0
      xcode: 16.3
      cocoapods: default
      # Configure this group in Codemagic UI → Teams → Integrations → App Store Connect
      # with APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID,
      # APP_STORE_CONNECT_PRIVATE_KEY and CERTIFICATE_PRIVATE_KEY
      groups:
        - apple_signing
      vars:
        BUNDLE_ID: com.pace5.app
        APPLE_TEAM_ID: N32B8VPXR4

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@latest

      - name: Install Node dependencies
        script: pnpm install --frozen-lockfile

      - name: Expo Prebuild — generate ios/ folder
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set Xcode code-signing profiles
        script: xcode-project use-profiles

      - name: Build archive
        script: |
          xcodebuild \
            -workspace ios/pace5.xcworkspace \
            -scheme pace5 \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/pace5.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            clean archive \
            | xcpretty

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/pace5.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/ipa"

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/pace5.xcarchive

    publishing:
      email:
        recipients:
          - vinicius@pace5.com.br
        notify:
          success: true
          failure: true
