workflows:
  ios-adhoc:
    name: iOS Ad Hoc
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22.14.0
      xcode: 16.3
      cocoapods: default
      groups:
        - apple_signing
      vars:
        BUNDLE_ID: com.pace5.app
        APPLE_TEAM_ID: N32B8VPXR4
    scripts:
      - name: Install Node dependencies
        script: |
          pnpm config set minimumReleaseAge 0
          pnpm install --no-frozen-lockfile
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set Xcode code-signing profiles
        script: xcode-project use-profiles
      - name: Build archive
        script: |
          xcodebuild \
            -workspace ios/pace5.xcworkspace \
            -scheme pace5 \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/pace5.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            clean archive \
            | xcpretty
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/pace5.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/ipa"
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/pace5.xcarchive
    publishing:
      email:
        recipients:
          - vinicius@pace5.com.br
        notify:
          success: true
          failure: true
